services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 80"
    env_file:
      - .env
    volumes:
      - ./client:/app
    expose:
      - "80"

  server:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install uv && uv sync && uv run main.py --port 8000 --volume-reload"
    env_file:
      - .env
    volumes:
      - ./server:/app
    expose:
      - "8000"