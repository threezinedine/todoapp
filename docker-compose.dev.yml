services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./client:/app
    ports:
      - "80:5173"
  server:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install uv && uv sync && uv run main.py --port 8000 --volume-reload"
    volumes:
      - ./server:/app
    ports:
      - "3000:8000"