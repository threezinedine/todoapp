services:
    nginx:
        build:
            context: nginx
        ports:
            - '80:80'
        depends_on:
            - web
            - server

    web:
        build:
            context: client
        env_file:
            - .product.env
        expose:
            - '80'

    server:
        build:
            context: server
        env_file:
            - .product.env
        expose:
            - '8000'
        depends_on:
            database:
                condition: service_healthy

    database:
        image: mysql:8.0
        env_file:
            - .product.env
        expose:
            - '3306'
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
